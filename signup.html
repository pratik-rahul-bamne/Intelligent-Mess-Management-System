<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Intelligent Mess Management</title>
    <meta name="description" content="Create an account for the Intelligent Mess Management System">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="auth-layout">
        <div class="auth-box">
            <div style="text-align: center;">
                <div class="auth-logo">
                    <!-- Crisp SVG Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <h2 class="auth-title">Create an account</h2>
                <p class="auth-sub">Join your campus dining system</p>
            </div>
            
            <div id="signupError" class="alert alert-danger" style="display:none;margin-bottom:1.5rem">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="signupErrorText"></span>
            </div>
            
            <form id="signupForm">
                <div class="form-group mb-2">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required autofocus />
                </div>
                <div class="form-group mb-2">
                    <label for="email">University Email</label>
                    <input type="email" id="email" name="email" placeholder="john@university.edu" required />
                </div>
                <div class="form-group mb-2">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="johndoe123" required />
                </div>
                <div class="form-group mb-4">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" />
                </div>
                
                <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem; font-size: 0.95rem; margin-top: 0.5rem;">
                    Create Account
                </button>
            </form>
            
            <div style="text-align:center; margin-top: 2rem;">
                <span class="text-muted text-sm">Already have an account? </span>
                <a href="index.html" class="text-sm font-semibold" style="color:var(--text-strong); text-decoration: none; border-bottom: 1px solid var(--border-color); padding-bottom: 1px;">Sign in</a>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    <script src="assets/js/main.js"></script>
</body>
</html>
