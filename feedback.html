        <main class="main-content">
    <div class="mb-6">

        <h2 class="page-title">Feedback</h2>

        <p class="page-subtitle">Review user ratings and complaints</p>

    </div>

    <div class="grid-2">
        <!-- Submit Feedback Form -->
        <div class="card" id="submitFeedbackCard">
            <h3>📝 New Feedback</h3>
            <form id="feedbackForm" style="display:flex;flex-direction:column;gap:1rem;margin-top:1rem">
                <div>
                    <label>Related Meal (Optional)</label>
                    <select id="fbMealSelect">
                        <option value="">-- General Feedback --</option>
                    </select>
                </div>
                <div>
                    <label>Rating</label>
                    <div class="star-rating" id="fbStarRating">
                        <span data-val="1" onclick="selectFbStar(1)">★</span>
                        <span data-val="2" onclick="selectFbStar(2)">★</span>
                        <span data-val="3" onclick="selectFbStar(3)" class="active">★</span>
                        <span data-val="4" onclick="selectFbStar(4)">★</span>
                        <span data-val="5" onclick="selectFbStar(5)">★</span>
                    </div>
                    <input type="hidden" id="fbSelectedRating" value="3">
                </div>
                <div>
                    <label>Message / Suggestion</label>
                    <textarea id="fbMessage" rows="4" placeholder="How was the food today? Any suggestions for improvement?" required></textarea>
                </div>
                <button type="submit" style="align-self:flex-start">📨 Submit Feedback</button>
            </form>
        </div>

        <!-- Feedback History -->
        <div class="card">
            <h3>📜 Feedback History</h3>
            <div class="table-toolbar">
                <input type="search" id="feedbackSearchInput" placeholder="Search feedback…" style="max-width:260px">
            </div>
            <div class="table-wrapper">
                <table id="feedbackTable">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Rating</th>
                            <th>Message</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackTableBody">
                        <tr><td colspan="5" class="text-muted" style="text-align:center;padding:2rem">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    </main>
    </div>
</div>

<div id="toast-container"></div>
<div id="confirm-overlay">
    <div id="confirm-box">
        <p id="confirm-msg"></p>
        <div class="form-actions">
            <button class="btn-danger" id="confirm-yes">Confirm</button>
            <button class="btn-secondary" id="confirm-no">Cancel</button>
        </div>
    </div>
</div>

<script src="assets/js/main.js"></script>
<script>
// Star rating logic for feedback form
function selectFbStar(val) {
    document.getElementById('fbSelectedRating').value = val;
    document.querySelectorAll('#fbStarRating span').forEach(s => {
        s.classList.toggle('active', parseInt(s.dataset.val) <= val);
    });
}

// Populate meals in dropdown
document.addEventListener('DOMContentLoaded', async () => {
    const sel = document.getElementById('fbMealSelect');
    if(sel) {
        const meals = await fetch('/api/meals', {credentials:'include'}).then(r=>r.json()).catch(()=>[]);
        // show last 10 meals
        meals.slice(0, 10).forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = `${m.date} - ${m.meal_type.charAt(0).toUpperCase()+m.meal_type.slice(1)}`;
            sel.appendChild(opt);
        });
    }
});

// Submit form
document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
        meal_id: document.getElementById('fbMealSelect').value || null,
        rating: parseInt(document.getElementById('fbSelectedRating').value, 10),
        message: document.getElementById('fbMessage').value
    };
    const r = await fetch('/api/feedback', { method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const res = await r.json();
    showToast(res.message || (res.success ? 'Thank you for your feedback!' : 'Failed'), res.success ? 'success' : 'danger');
    if (res.success) { 
        document.getElementById('fbMessage').value = '';
        selectFbStar(5);
        if(typeof loadFeedback === 'function') loadFeedback(); 
    }
});
</script>
