<script src="assets/js/main.js"></script>
<script>
// Override loadUsers to add edit/deactivate buttons
document.addEventListener('DOMContentLoaded', () => {
    const origLoad = loadUsers;
    loadUsers = async () => {
        const tb = document.getElementById('usersTableBody');
        if (!tb) return;
        const users = await fetch('/api/users', {credentials:'include'}).then(r=>r.json()).catch(()=>[]);
        if (!users.length) { tb.innerHTML = '<tr><td colspan="7">No users found</td></tr>'; return; }
        tb.innerHTML = users.map(u => `<tr>
            <td>${u.name} ${u.id===3?'<span class="badge badge-success">Admin</span>':''}</td>
            <td>${u.roll_number||'—'}</td>
            <td>${u.email}</td>
            <td>${u.role}</td>
            <td><span class="badge badge-${u.status==='active'?'success':'danger'}">${u.status}</span></td>
            <td>${new Date(u.created_at).toLocaleDateString()}</td>
            <td>
                ${u.id !== 1 ? `<button class="btn-sm ${u.status === 'active' ? 'btn-danger' : 'btn-success'}" onclick="toggleUserStatus(${u.id}, '${u.status}')">
                    ${u.status === 'active' ? 'Deactivate' : 'Activate'}
                </button>` : '—'}
            </td>
        </tr>`).join('');
        addTableSearch('usersSearchInput', 'usersTable');
        addPagination('usersTable', 10);
    };
});

async function toggleUserStatus(id, currentStatus) {
    const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
    confirmAction(`Set user status to ${newStatus}?`, async () => {
        const r = await fetch(`/api/users/${id}/status`, {
            method:'PUT', credentials:'include', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({status: newStatus})
        });
        const res = await r.json();
        showToast(res.message || 'Status updated', res.success ? 'success' : 'danger');
        if(res.success) loadUsers();
    });
}
</script>
