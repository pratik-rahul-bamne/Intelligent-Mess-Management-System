<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Intelligent Mess Management</title>
    <meta name="description" content="Login to the Intelligent Mess Management System">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="auth-layout">
        <div class="auth-box">
            <div style="text-align: center;">
                <div class="auth-logo">
                    <!-- Crisp SVG Icon -->
                    <svg xmlns="http://www.w3.org/-logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <h2 class="auth-title">Welcome back</h2>
                <p class="auth-sub">Sign in to your account</p>
            </div>
            
            <div id="loginError" class="alert alert-danger" style="display:none;margin-bottom:1.5rem">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="loginErrorText"></span>
            </div>
            
            <form id="loginForm">
                <div class="form-group mb-2">
                    <label for="username">Email or Username</label>
                    <input type="text" id="username" name="username" placeholder="name@university.edu" required autofocus />
                </div>
                <div class="form-group mb-4">
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" style="margin: 0;">Password</label>
                        <a href="#" onclick="showForgotPassword()" class="text-xs font-medium" style="color:var(--brand-main); text-decoration: none;">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" placeholder="••••••••" required />
                </div>
                
                <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem; font-size: 0.95rem; margin-top: 0.5rem;">
                    Sign in
                </button>
            </form>
            
            <div style="text-align:center; margin-top: 2rem;">
                <span class="text-muted text-sm">Don't have an account? </span>
                <a href="signup.html" class="text-sm font-semibold" style="color:var(--text-strong); text-decoration: none; border-bottom: 1px solid var(--border-color); padding-bottom: 1px;">Sign up</a>
            </div>
            
            <div class="demo-box mt-6">
                <h4>Demo Credentials</h4>
                <div class="flex justify-between items-center mb-1">
                    <span class="text-strong">Admin</span>
                    <span class="text-muted">admin / admin123</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-strong">Student</span>
                    <span class="text-muted">student1 / stud123</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    <script src="assets/js/main.js"></script>
    <script>
    function showForgotPassword() {
        const email = prompt('Enter your registered email:');
        if (!email) return;
        fetch('/api/forgot_password', {
            method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})
        }).then(r=>r.json()).then(res=>showToast(res.message, res.success?'info':'danger'));
    }
    </script>
</body>
</html>
